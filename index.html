<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Biblioteca</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 30px;
  color: #ff6a00;
  text-shadow: 0 0 12px #ff6a00;
  border-bottom: 1px solid #222;
}

header a {
  color: #ff6a00;
  text-decoration: none;
}

/* BUSCADOR */
.search-box {
  display: flex;
  justify-content: center;
  padding: 15px;
}

.search-box input {
  width: 80%;
  max-width: 600px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ff6a00;
  background: #111;
  color: white;
  outline: none;
}

/* GRID 5 COLUMNAS */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

@media (max-width: 1100px) {
  .container { grid-template-columns: repeat(4, 1fr); }
}

@media (max-width: 800px) {
  .container { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 500px) {
  .container { grid-template-columns: repeat(2, 1fr); }
}

/* ITEM */
.item {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px;
  background: #111;
  border: 1px solid #222;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.item:hover {
  border-color: #ff6a00;
  transform: scale(1.03);
}

.thumb {
  width: 100%;
  height: 90px;
  background: #222;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
  font-size: 12px;
}

.title {
  margin-top: 8px;
  font-size: 12px;
  color: #ff6a00;
  text-align: center;
}

/* PLAYER */
.player {
  width: 100%;
  max-width: 900px;
  margin: 20px auto;
  display: none;
}

.player iframe {
  width: 100%;
  height: 450px;
  border: 2px solid #ff6a00;
  border-radius: 10px;
}

/* BACK */
.back-btn {
  display: none;
  text-align: center;
  margin: 10px;
  cursor: pointer;
  color: #ff6a00;
}

/* RELACIONADOS */
.related-title {
  max-width: 1200px;
  margin: 20px auto 10px;
  color: #ff6a00;
  display: none;
}
</style>
</head>

<body>

<header><a href="index.html" style="color: white; text-decoration: none;">Mi Biblioteca</a></header>

<div class="search-box">
  <input type="text" id="search" placeholder="Buscar por título...">
</div>

<div class="back-btn" id="backBtn">⬅ Volver</div>

<!-- PLAYER -->
<div class="player" id="playerBox">
  <iframe id="player" allowfullscreen></iframe>
</div>

<div class="related-title" id="relatedTitle">Relacionados</div>

<!-- LISTAS -->
<div class="container" id="list"></div>
<div class="container" id="related"></div>

<script>

  { titulo: "SWEETIE FOX - ROUGUE", url: "https://hqq.ac/e/V1R4bEZGeUlBd2F3dEU3RHBydXBaUT09", actriz: "sweetie fox", letra: "r", img: "https://i0.wp.com/s8.netu.tv/flv/api/files/thumbs_new/2026/04/22/17768906325dt0k/17768906325dt0k-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - JANE DOE", url: "https://hqq.ac/e/QVRRNDRiYU5ZT25ZK1dkb1EycjhnZz09", actriz: "sweetie fox", letra: "j", img: "https://i0.wp.com/s8.netu.tv/flv/api/files/thumbs_new/2026/04/22/17768908768wa4g/17768908768wa4g-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - PSYLOCKE", url: "https://hqq.ac/e/VWZzTU9nbGd2Z3N5czFkZm91VzhCdz09", actriz: "sweetie fox", letra: "p", img: "https://i0.wp.com/s1.netu.tv/flv/api/files/thumbs_new/2026/04/22/1776890906e5rct/1776890906e5rct-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - SCARLET WITCH", url: "https://hqq.ac/e/dFVod0sraTNlTnp4TTFabXA0YlBpUT09", actriz: "sweetie fox", letra: "s", img: "https://i0.wp.com/s1.netu.tv/flv/api/files/thumbs_new/2026/04/22/1776891249xzrwd/1776891249xzrwd-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - TSUYU ASUI", url: "https://hqq.ac/e/TlpyQmtjRzFVWWRSVjhHeTJnVFhxUT09", actriz: "sweetie fox", letra: "t", img: "https://i0.wp.com/s13.netu.tv/flv/api/files/thumbs_new/2026/04/23/1776891936vwfpr/1776891936vwfpr-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - LOLA BUNNY", url: "https://hqq.ac/e/VTh5bjFhNzZSZnRVZzByV1plcmc5Zz09", actriz: "sweetie fox", letra: "l", img: "https://i0.wp.com/s5.netu.tv/flv/api/files/thumbs_new/2026/04/23/177689181220cbu/177689181220cbu-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - ALBEDO", url: "", actriz: "sweetie fox", letra: "a", img: "" },

  { titulo: "SWEETIE FOX - ANKHA", url: "https://hqq.ac/e/c3c3UDJ4NVcrS0lCc0JJOEYwcitIZz09", actriz: "sweetie fox", letra: "a", img: "https://i0.wp.com/s13.netu.tv/flv/api/files/thumbs_new/2026/04/23/1776892809xd2g2/1776892809xd2g2-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - ZELDA", url: "https://hqq.ac/e/Qzc4TFVzS2RFL2R0WEkxWWJJUnAydz09", actriz: "sweetie fox", letra: "z", img: "https://i0.wp.com/s11.netu.tv/flv/api/files/thumbs_new/2026/04/23/1776893088510l6/1776893088510l6-640x480-1.jpg" },
  { titulo: "SWEETIE FOX - TATSUMAKI", url: "", actriz: "sweetie fox", letra: "t", img: "" }
];

const list = document.getElementById("list");
const related = document.getElementById("related");
const search = document.getElementById("search");

const player = document.getElementById("player");
const playerBox = document.getElementById("playerBox");

const backBtn = document.getElementById("backBtn");
const relatedTitle = document.getElementById("relatedTitle");

function render(filter = "") {
  list.innerHTML = "";

  const ordenados = [...videos]
    .filter(v => v.titulo.toLowerCase().includes(filter.toLowerCase()))
    .sort((a, b) => a.letra.localeCompare(b.letra));

  ordenados.forEach(v => {
    list.innerHTML += `
      <div class="item" onclick="openVideo('${v.url}', '${v.actriz}')">
        <div class="thumb">${v.img}</div>
        <div class="title">${v.titulo}</div>
      </div>
    `;
  });
}

function openVideo(url, actriz) {
  if (!url) return;

  list.style.display = "none";
  search.value = "";

  playerBox.style.display = "block";
  backBtn.style.display = "block";

  player.src = url;

  const rel = videos.filter(v => v.actriz === actriz && v.url !== url);

  related.innerHTML = "";
  relatedTitle.style.display = rel.length ? "block" : "none";

  rel.forEach(v => {
    related.innerHTML += `
      <div class="item" onclick="openVideo('${v.url}', '${v.actriz}')">
        <div class="thumb">PREVIEW</div>
        <div class="title">${v.titulo}</div>
      </div>
    `;
  });

  window.scrollTo({ top: 0, behavior: "smooth" });
}

backBtn.onclick = () => {
  playerBox.style.display = "none";
  backBtn.style.display = "none";
  related.innerHTML = "";
  relatedTitle.style.display = "none";
  list.style.display = "grid";
  player.src = "";
};

search.addEventListener("input", e => {
  render(e.target.value);
});

render();
</script>

</body>
</html>
